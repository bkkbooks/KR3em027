body:
  text: 自敘先外祖尹慎徽先生博學詩詞書畫各臻其妙尤精岐黃術紀方負笈從學而於內外科喉科腫證刻志研求二十年來險逆諸證一一經歷博訪旁咨悉心討論竊謂深有所得第白喉一證世無專書而時醫之業喉科者於內經缺焉不講故偶遇危殆茫然莫解即有一二高明亦多狃於習見有偏於寒者有偏於熱者偏寒偏熱不獨不為濟世資且適貽為殺人刃余心焉憫之誦讀餘暇轍與表兄趙仲標以外祖所傳治白喉證方之屢試經驗者纂輯白喉全生集是書以寒熱二字為綱領而寒熱中又分輕重虛實其辨證辨脈縷晰條分而用藥用方通權達變簡而精約而備使人得是書以釋疑難非敢云良方濟世亦足以立起沉疴焉光緒八年壬午冬月衡山李紀方倫青氏敘於龍門山房凡例一白喉病熱證本多寒證較少而寒熱所郁無不有毒此時醫所以專指為疫而用藥多偏於涼也不知白喉少寒證非無寒證白喉之熱證有毒寒證亦非無毒時醫一偏之見殺人無算論中設為問答分條詳辨熟玩之自悟其謬一凡病必有寒熱二種非白喉獨異也是書以寒熱二字為綱領而其中又分出輕重虛實毫無一偏之弊其方又無不從親驗而來故言之最質最切一寒熱之分必先憑證證既認清復參之以脈自無遁情矣蓋言脈尚可含糊而言證無可遷就也古人以切居望聞問之後自有深義故是書辨證最詳辨脈從略一是書以寒證熱證寒熱錯雜證分三大綱病情萬變總不出此三者也而三證之方即附於後以便尋覽一各方皆借古人成方而加減之無一師心者按證尋方皆藥到病愈切勿增損如有兼證則不妨變通至寒熱錯雜證尤不易治故方論獨詳一治白喉之法服藥宜慎吹藥尤宜精若鄉村僻壤一時水藥不能驟得全賴吹藥以救其急時醫有通行吹藥遇輕證尚可重證無不貽誤者是書吹藥亦以寒證熱證寒熱錯雜分三大綱按證用藥無不立驗切不可一味增減一白喉險證壞證牙關緊閉痰涎上湧有不能服藥亦無可吹藥者法宜先開關以掃其痰涎甚則針刺各穴以出惡血通經活絡便立時清醒再行吹藥服藥即愈矣是書開關敷貼針刺方法備極精詳但當依法行之一是書雖專為白喉立法然一切喉風單雙乳蛾重舌等證總不外表里寒熱虛實六字醫者臨證果能通權達變彼此類推無不可治之喉疾矣一是書和盤托出不隱祕一方不杜撰一法醫者得之可以立開其沉痼病者玩之亦不終誤於庸醫救人之功余不敢分害人之罪余當獨認白喉證論白喉證古書未載而時醫專目為疫證謬矣凡治病必先尋經絡次察寒熱次審虛實三者既明雖雜證百出可一以貫之如白喉證亦寒暑之不時氣血之不調所致非六經之外別有一病也焉有不審寒熱虛實而概指為疫者乎經云赤屬熱白屬寒如所言則白喉只有寒而無熱其曰熱者亦從證而別之耳若概指為疫則只有熱而無寒矣於理安在此其弊皆由不辨證不辨脈徒聽時醫之説以人之性命委諸無形之斧斤豫甚惜之誦讀之暇因將白喉證治法條分縷晰以寒熱二字為綱領而寒熱之中又分輕重虛實庶用藥無毫釐千里之謬書既成或有疑之者曰既非疫焉有傳染曰氣之相感理之常然如傷風瘡毒之類防身者每不與共寢食若以傳染為疫則傷風瘡毒不亦可云疫乎曰有傳染不傳染何也曰物必先朽也而後蟲生其傳染者必其人內有寒熱始觸而發也故有同一室而傳與不傳各異傳者之寒與熱亦各異曰其色白何也曰白屬肺凡風寒熱之中人未有不由肺入而傷氣者喉為氣之門戶故宜宣發而時醫忌表藥謬矣曰寒熱之為病甚多而獨發於喉何也曰十二經惟足太陽主表別下項余皆內循於喉盡得而病之也蓋陽明為水穀之海而胃氣直透咽喉故喉疾惟陽明之火最盛少陽厥陰為木火之藏亦多熱證少陰之脈絡於舌本凡陰火沖逆多生喉疾但其中有虛有實不得概從火斷而少陰尤不可概從火斷如酒色過度真陰中之陰虧損火無所養非補水以配火不可易所謂水火既濟者是也真陰中之陽虧損火無所歸非補火以引火不可易所謂火就燥者是也此褚氏遺書所以有上病療下之説也曰何死之速也白喉急證非死證也治之不善則死矣如熱證投以熱藥寒證投以寒藥或表證而攻下或虛證而表散如人之無辜受戮雖欲不死焉得而不死且每聞白喉之死死於熱證者少死於寒證者多大抵人知有熱證而不知有寒證即知有寒證而不知有虛寒之證皆誤於疫之一字也然則豫之辨之也其容已乎但見淺學寡不無疏漏尚冀高明之士匡豫不逮則幸甚辨證法一白點在外關者小舌旁邊多屬熱在內關者小舌內多屬寒一熱證必腫寒證不腫喉內反大而空亦有虛腫者其形必潤一熱證必痛痛無止息略痛者輕痛甚者重寒證不甚痛或時痛時止一熱證喝水不甚痛吃飯則痛寒證喝水痛吃飯不甚痛一熱證必渴喜喝水喜溫者輕喜冷者重少喝者輕多喝者重寒證不渴雖渴不多喝水喜溫者輕喜極熱者重一熱證不思食亦不能食一由腫痛一由不知味寒證能食而不甚思食一由脾虛一由脾絶一由過服寒劑一熱證有風涎涎少者輕涎多者重宜解表從涼散寒證則斷無風涎若風寒相兼亦有風涎宜解表從溫散一熱證白點必乾澀或一邊一點或一邊數點大小不一寒證白點必明潤或成點或成塊甚者滿喉俱白狀如凝膏或如霜雪一熱證白點外皆深紅色或紅絲紅絲者輕寒證白點外皆淡紅色或紅絲紅絲者輕一熱證舌苔或黃或黑宜察其潤燥燥者是實熱宜下之潤者是假熱宜清之寒證舌苔必白或間有黑黃色水極似火之象亦宜察其潤燥燥者寒輕宜微溫潤者寒重宜大溫鼻孔口唇俱宜察其潤燥但有火爍肺而鼻燥者有肺氣絶而鼻燥者有肺火伏而唇燥者有胃氣不升而唇燥者有脾氣絶而唇燥者有傷食而唇燥者俱宜詳察眼目但察其畏風與否畏火與否而已一熱證小便必赤赤而熱且短數者是實熱宜導之赤而不熱且長而多者是假熱宜清之若清長則的是寒證矣一熱證大便必燥燥而腹中堅滿欲解不能或解如羊矢者為實熱宜下之燥而不結或先結後溏或旬日不解而全無脹意者為虛熱宜清之若大便純溏則的系是寒證宜溫之至滑泄不守宜溫而補之即兼有熱證亦不可妄議攻下一辨證宜相天時度地勢審人事大約夏秋多熱春冬多寒住平陽之地者多熱住深山冷浸之地者多寒體強者多熱體弱者多寒好酒者多熱好色者多寒少壯者多熱年老者多寒雖不盡然此其大較也一白喉無論寒熱證如汗出似油者不治失音動痰氣喘者不治目光直視者不治用針無血者不治吹藥無涎者不治吹藥即刻痛止白落過日復患者不治滿喉白滿喉腫者惟熱證不治醫者如遇此等證候切勿輕與用藥辨脈法熱證脈主數浮細而數為風熱其熱輕宜散之如升陽散火湯之類浮洪而數按指有力或沉而牢實為實火其熱重宜下之如清咽利膈湯之類不拘浮數沉數但按指無力乃是假熱宜散而兼清如甘桔湯之類寒證脈主緊浮細而緊為風寒其寒輕宜表散如荊防敗毒散之類沉細而弦緊其寒重宜溫散如參桂飲之類若重按不見為虛寒宜溫補如理中湯之類用藥法一治白喉者時醫各有忌藥有忌升麻者忌細辛者忌麻黃者忌白朮者忌地黃者並全忌表藥者種種惡習深可慨嘆若舍證而言藥何藥不忌一熱證誤服寒證尚輕各方者雖不愈尚不死誤服寒證漸重各方及補方者必死寒證誤服熱證漸重各方者必死虛寒證過服表劑或誤服下藥者必死寒熱二證判若冰炭此之不審殺人反掌可不慎與一表藥不過宣發內邪使無遏抑原不能取急效治者不可因其無效而過服或涼或溫急宜轉方蓋表藥多辛竄過服則耗散真氣必至氣壅也一白喉服藥與吹藥並重蓋寒熱伏於內非服藥不能治其本而毒氣壅於喉非吹藥不能解其標也若危險之證必先吹藥掃去痰涎而後可以服藥至輕證初起則吹藥一二次即愈矣並無庸服藥也故吹藥尤煉之宜精備之宜豫一白喉不無傳染非因熱證而傳染者即為熱證因寒證而傳染者即為寒證也宜視人之秉賦強弱氣血虛實用藥一患白喉者必兼感雜證若有萬難兼理者只治白喉證不理雜病而雜病亦自可愈何也病未有不相因者也即或白喉已愈而雜病未愈或白喉已愈而雜病又生則在醫者變而通之神而明之古方俱在不能備述白喉熱證尚輕治法俗所謂時疫毒證者即專指此熱證也初起白見於外關或薄或小淡紅微腫略痛聲音響亮牙關飲食稍礙口乾頭悶目脹舌苔與小便微黃即其候也此熱邪尚在表治宜人參敗毒散升陽散火湯連翹飲加減主之人參敗毒散洋參二錢或用條參防風二錢去蘆白芷二錢浙貝二錢去心桔梗三錢銀花三錢僵蟲三錢薑汁炒鼠黏三錢荊芥一錢人中黃一錢蟬蛻七隻去頭翅足皂角刺三根煨水煎服升陽散火湯柴胡二錢去蘆連翹二錢僵蟲二錢薑汁炒防風二錢去蘆桔梗三錢鼠黏三錢蟬蛻七隻去頭翅足山豆根一錢射干一錢薄荷一錢荊芥一錢人中黃一錢皂角刺三根煨水煎服連翹飲連翹三錢桔梗三錢鼠黏三錢僵蟲二錢薑汁炒銀花二錢黃芩一錢人中黃一錢粉葛一錢五分赤芍一錢五分薄荷八分皂刺三根水煎服白喉熱證漸重治法白見於關內外色必乾焦或黃而凸厚而多牙關緊閉滿喉紅腫疼痛異常痰涎壅甚飲食難咽語言不爽舌苔深黃甚或焦黑芒刺口渴口臭便閉溺澀目赤心煩身輕惡熱即其候也此熱邪已入里治宜達原飲普濟消毒飲清咽利膈湯加減主之達原飲檳榔二錢草果二錢煨連翹二錢僵蟲二錢薑汁炒厚朴一錢知母一錢蟬蛻七隻去頭翅足栝蔞殼一錢五分黃芩一錢五分人中黃一錢五分水竹茹一錢五分銀花三錢水煎服普濟消毒散元參三錢桔梗三錢連翹三錢鼠黏三錢薄荷一錢五分陳皮一錢五分黃芩一錢五分馬勃三分布包煎黃連六分僵蟲二錢板藍根一錢或青黛代水煎服清咽利膈湯芒硝三錢銀花三錢鼠黏三錢大黃六錢酒炒黃連八分枳實一錢五分連翹一錢五分梔子一錢五分薄荷一錢五分僵蟲二錢薑汁炒人中黃二錢厚朴一錢生石膏三錢水煎服白喉寒證尚輕治法初起白見於關內或關外色必明潤而平滿喉淡紅微腫略痛頭痛惡寒發熱飲食如常舌苔白二便和即其候也此寒邪尚在表治宜柴胡飲參艾飲荊防敗毒散加減主之柴胡飲柴胡二錢去蘆羌活二錢法夏二錢薑汁炒抖僵蟲二錢薑汁炒桔梗一錢五分銀花一錢五分蟬蛻七隻去頭翅足厚朴五分薑汁炒陳皮一錢粉草一錢生薑三片水煎服參艾飲條參四錢前胡二錢法夏二錢薑汁炒抖僵蟲二錢薑汁炒桔梗三錢銀花三錢陳皮一錢枳殼一錢粉草一錢艾葉三皮水煎服荊防敗毒散防風三錢去蘆柴胡二錢去蘆僵蟲二錢薑汁炒法夏二錢薑汁炒抖桔梗二錢前胡二錢獨活二錢荊芥一錢五分羌活一錢五分銀花一錢五分枳殼一錢粉草一錢生薑三片水煎服白喉寒證漸重治法白見於關內成點成塊或滿喉俱白色如凝膏喉內淡紅微腫時痛時止頭項強痛身重惡寒發熱咳嗽結胸聲低痰壅舌苔必白而厚不思飲食目眩倦臥或手足冷逆欲吐腹痛即其候也此寒邪已入里治宜五積散參桂飲溫胃湯加減主之五積散蒼朮二錢白芷二錢法夏二錢薑汁炒抖桔梗二錢川芎二錢銀花一錢五分僵蟲一錢五分薑汁炒厚朴一錢薑汁炒枳殼一錢粉草一錢煨薑三片水煎服參桂飲條參五錢銀花二錢法夏二錢薑汁炒抖僵蟲二錢薑汁炒肉桂五分去皮陳皮一