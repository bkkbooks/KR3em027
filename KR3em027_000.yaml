一錢五分薑汁炒雲苓三錢丹皮一錢去骨澤泄一錢鹽水炒麥冬一錢去心炙草一錢泡圓三粒水煎服歸芍六君湯寒證黨參五錢白朮三錢白芍三錢云神三錢法夏二錢當歸一錢五分僵蟲一錢五分薑汁炒陳皮一錢銀花一錢炙草一錢煨薑三片水煎服加減益氣湯黃耆三錢白朮三錢僵蟲一錢五分薑汁炒銀花一錢五分黨參五錢當歸一錢陳皮一錢炙草一錢煨薑三片水煎服加減右歸飲熟地五錢淮藥六錢炒本制附片三錢杜仲一錢鹽水炒枸杞一錢炙草一錢肉桂五分去皮蒸兌泡圓三粒水煎服或加參朮婦人白喉證治法皆同惟孕婦所吹之藥須去片麝所服之藥如法夏南星附片肉桂大黃芒硝牛膝厚朴等藥皆能墮胎若證稍輕或認證未確切戒妄用如實系虛寒危險之證必須附桂方可回將脫之元陽實系壯熱危險之證必須硝黃方可救欲絶之真陰則不妨放膽用之有病病受於胎仍無傷也但宜中病即止不可過劑經云毒藥治病十去六七此之謂也小兒白喉證治法皆同惟小兒為啞科凡有發熱咳嗽口流涎沫飲乳便哭者必須看喉嚨有無形迹倘喉內紅腫發有白點如法施治但血骨未充服藥之分兩宜視年歲之大小體氣之強弱而酌減之然小兒好哭難於吹藥輕證即可以服藥而愈其有危險重證仍須吹藥不可畏其啼哭而不用也白喉熱證吹藥此方不獨白喉可治即風熱喉症以及齒痛舌泡諸病無不神效惟熊膽牛黃麝香三味真品既少價值又昂難於製備現在另有增減一方附刻本集之後功效如神離宮回生丹治熱證白喉及乳蛾喉風等證熊膽二錢如濕潤於銀窩子內微火焙乾西洋參二錢黃連六分山慈菰一錢硼砂二錢人中黃一錢兒茶五分真麝香三分青黛五分大梅片一錢薄荷七分真牛黃一錢除熊膽牛黃片麝外共研極細末過絹篩合熊膽牛黃片麝再乳精細瓷瓶收貯臘封固瓶口勿使泄氣臨時計每次以三釐對參艮宮除害丹三釐用銅風鼓吹入白處含噙片時使毒氣隨風涎吐出便立刻回生白喉寒證吹藥坎宮回生丹治喉證白喉及乳蛾喉風等證真血竭一錢細辛一分真雄精二錢牙皂二分大梅片四分硼砂一錢真麝香六分鬱金一錢生附片一錢密炙極焦枯除片麝外共研極細末過絹篩合片麝再乳精細瓷瓶收貯臘封固瓶口勿使泄氣臨時計每次以三釐對參艮宮除害丹一釐用銅風鼓吹入白處含噙片時使毒氣隨風涎吐出便立刻回生艮宮除害丹專治一切白喉證真珍珠三錢放水豆腐上蒸三尺香久地蝨婆二釐放銀窩內微火焙焦真瑪瑙三錢入砂罐內火焙七尺香久手指甲五分瓦焙焦真珊瑚三錢入砂罐內火焙七尺香久馬勃三釐真琥珀三錢蚯蚓六分瓦焙枯真辰砂三錢水飛蠶繭七隻燒灰存性真麝香五分大梅片六分共研極細末過絹篩再乳精瓷瓶收貯臘封固瓶口勿使泄氣便寒熱證臨時對用白喉寒熱錯雜證吹藥三仙丹即離宮回生丹一分坎宮回生丹一分艮宮除害丹五釐臨時和勻吹法照前吹完再依分兩對用白喉雜治通用方開關立效散治一切白喉牙關緊閉湯水難入等證真雄精一錢細辛一分真牛黃一錢牙皂二分真麝香四分薄荷六分去梗大梅片五分除麝片牛黃外共研極細末過絹篩合麝片牛黃再乳精細瓷瓶收貯蠟封固瓶口勿使泄氣臨時以三四釐吹兩腮內或以少許吹鼻孔立刻開竊掃涎立效丹治一切白喉風涎壅滯急證巴豆去殼取淨肉三粒明礬二錢合巴豆炒枯為度去巴豆取礬乳細末瓷瓶收貯遇風涎壅滯用少許溫水泡透新筆醮水塗掃喉內使風涎吐出然後吹藥則取效更捷掃後用二次米泔水漱口提毒異功散治一切白喉急證真血竭六分斑蝥四錢大梅片三分制乳香六分去淨油全蠍六分麝香三分制沒藥六分去淨油元參六分斑螫去頭翅足糯米拌炒以米色微黃為度炒後去米除麝片外共研細末過絹篩再合麝片乳細瓷瓶收貯遇一切喉證將隨用膏藥開攤以此散放膏藥中心貼頸項須對喉內腫處左腫貼左右腫貼右左右俱腫兩邊皆貼閲五六時揭去膏藥貼處必起水泡用針刺破揩淨毒水即能消腫止痛亦救急法也平險如意散治一切白喉內外俱腫急證赤小豆四錢大黃四錢芙蓉葉四錢蚊蛤三錢四季蔥三根鼠黏三錢燕子窩泥五錢共研細未將四季蔥抖汁以陳茶水白酒各半共調和炒微熱敷頸項拔毒外出消腫止痛引龍歸海散治寒證白喉急證本制附片五錢吳萸三錢共研細末白酒調作二餅貼兩足心湧泉穴若天氣寒用火微烘庶無根之火浮越於上得此引之而自降亦以類相求之法也白喉針穴經絡法頰車穴在耳下八分屬足陽陰胃經少商穴第一手指內甲角屬手太陰肺經商陽穴第二手指外甲角屬手陽有大腸經中衝穴第三手指中甲角屬手厥陽心包絡經關衝穴第四手指內甲角屬手少陽三焦經少衝穴第五手指內甲角屬手少陰心經凡此六穴應病行針穴處俱離指甲一韭菜葉寬如病者畏針穴之多只針少商一穴亦立起沉疴宜針出惡血為妙無血者不治再用生薑擦針口布條包裹以避風襲入針口三方銀針式太陰肺經在大指內側去甲角一韭葉在中指端去甲角一韭葉系厥陰心包經在小指甲內側去甲角一韭葉系少陰心經在二指內側去甲角一韭葉系陽明胃經在四指外側去甲角一韭葉系少陽三焦經人有大小長短不同以同身寸尺取之人長則寸長人短則寸短老幼男婦皆然取法男左女右屈中指以草量中節屈紋為準頰車在耳下同身寸八分曲頰端近前陷中開口有空即是穴系陽明胃經附録一謝俶城明經有二孫俱患白喉季孫已死矣長孫在危急間醫總用攻利解毒清潤諸劑不效余用荊防敗毒散重用羌活以散表邪而始效繼以參桂飲而夏效適余他出前醫復用元麥地芍之類喉內加生兩蛾蛾上見白點又內關復起白塊兩條鼻塞出血痰壅兩顴通紅右寸關脈浮數而散大左緩弱而兩尺微此皆為腎中陰寒所逼龍雷之火上乘也若再清涼則愈滋陰寒寒愈盛而火愈升腎臟幾希之火其為陰寒所滅甚速耳故少陰臟中重在真陽陽不回則邪不去余以人參君主之藥保元肉桂辛溫補火入坎宮之命穴但中宮為寒涼久困更入炮薑溫中以助健行少加柴胡以提外陷之邪鼠黏僵蟲利咽消核果服一劑而平但內關白塊未退痰與火未降繼以參桂薑砂溫補中下南星法夏以消痰飲鼠黏利咽更入蔥汁以通陽氣真火既歸於中而陰凝之毒自解後以耆朮薑桂以收全功一楊君鈞和有女三長與季俱患白喉證斃而仲女又患此證延余往視白塊將滿不甚疼痛此虛寒證也服理中湯吹坎宮回生丹而愈後其家傳染者二一服參艾飲吹坎宮回生丹一服清咽利膈湯吹離宮回生丹而皆愈傳染者雖一病源而體氣寒熱攸分所以又不可拘方也一湘潭胡君筠棠之子小舌旁邊一點白痛甚脈浮數而細此病尚在表也余用人參敗毒散其家恐藥之太輕也別請醫以大承氣湯加豆根元參二劑而病劇既又延余轉用荊防敗毒散三劑全愈此輕證而用重劑之一戒也一湘潭馬丈益卿六十餘得一子視若掌珠凡食之稍寒者必禁勿與忽患白喉色焦黃痛甚余知其有積熱也用清咽利膈湯其家嫌藥之苦寒堅不與服余因辭去後醫迎其意以人參耆朮歸地薑桂其病轉劇次日聲嘶鼻血氣喘不三日而斃此實熱必用寒劑之一法也一常寧總戎周定安夫人病數日矣雜證多端尚不知為白喉因不甚痛故也一日偶言喉痛延余往治視內關白塊兩條色如凝膏其家懼甚余曰幸而未服涼劑也猶可以治吹坎宮回生丹服參桂飲二劑白塊減半繼以溫胃湯不數劑而全愈此寒證必用溫劑之一法也一長沙清軍府李蘭生都轉夫人忽患喉痛發熱惡寒頭悶心煩口渴便澀鼻出血絲延余往醫見內關白塊兩條色焦黃腫痛異常湯水難咽舌苔邊白中黃診右寸洪大而左關浮數此足厥陰手太陰風火上衝而成也余初用人參敗毒散吹離宮回生丹腫痛俱減次用四物甘桔湯白塊退諸證悉除後用六味地黃湯加栝蔞殼絲茅根而全愈一長沙陳漢仙茂才喉痛數日醫用清潤解毒諸劑而病愈劇發熱惡寒痰涎上湧聲如拽鋸小便不通湯水不能下咽已二日余矣其家視變證蜂起愴皇懼甚延余往治視喉內淡紅微腫內關白點已陷舌苔白兩手脈弦而緊誤以清涼凝閉風寒阻滯經絡余用坎宮回生丹合開關立效散連吹二三次立刻上下交通飲食即進隨以柴胡飲提已陷之邪不數劑諸證悉除後以加減六君子湯十劑而全愈一善化沈筱嵐孝廉大舌邊起白泡數顆醫用元麥赤芍竹葉之類連進三劑一宵忽痰涎上湧精神疲倦惡寒發熱胸結飲食不能下咽延余往治診兩寸浮弦右關沉緊喉內白塊已滿色如霜雪痰涎稠黏不斷此風寒在表未經宣發誤以寒涼迭進變成壞證也余用荊防敗毒散以驅表邪吹坎宮回生丹以祛惡毒次日白塊退淨而胸膈為風痰阻隔食入少頃即吐不能直達中下二焦證類關格其家懼甚復巫醫雜投百計罔效余細察脈證猶屬風痰之毒阻隔與喉無干遂用拔毒及引龍歸海之法始兩耳頸項稍發紅疹再用艾葉皂角白酒炒熱布包尉之隨尉隨發遍體紅疹無間其家以為變證懼之尤甚余曰此佳兆也必欲提毒表出始能開其阻隔次日果胸膈豁然飲食即進隨以人參敗毒散再提表以托毒繼以人參君主之藥保元鼠黏僵蟲利咽法夏陳皮以消痰飲銀花蟬蛻以清餘毒不數劑諸證悉除後用六君八珍以收全功此風寒表證必須宣發不可輒用清涼之一戒也附治單雙乳蛾神效吹藥方紫砂散明月石即硼炒一兩淨牙硝五分當門子一分紫荊皮五分大梅片五分飛硃砂五分共研細末瓷瓶封固遇症吹之孕婦忌用附原定增減白喉熱證吹藥方西洋參二錢大梅片一錢云連一錢五分山慈菰一錢元明粉六分硼砂三錢人中黃一錢西洋參葉八分去梗薄荷七分塊兒茶五分建青黛五分上藥除梅片青黛元明粉外共研極細末過絹篩再合梅片青黛元明粉同石禹精細瓷瓶收貯黃蠟封固瓶口勿使泄氣用法同前
